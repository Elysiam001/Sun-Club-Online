<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #1a1a1a; display: block; padding: 20px; }
        .admin-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--gold-light); padding-bottom: 10px; margin-bottom: 20px;
        }
        h1 { color: var(--gold-light); }
        .btn-logout { background: #ff3333; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; background: #2a2a2a; color: #fff; }
        th, td { padding: 12px; text-align: left; border: 1px solid #444; }
        th { background: var(--gold-dark); color: #000; }
        
        .badge { padding: 5px 10px; border-radius: 3px; font-size: 12px; font-weight: bold; }
        .badge.deposit { background: #00cc66; color: #000; }
        .badge.withdraw { background: #ff9900; color: #000; }
        
        .action-btn { padding: 5px 10px; border: none; border-radius: 3px; cursor: pointer; margin-right: 5px; font-weight: bold; }
        .btn-approve { background: #00ff41; color: #000; }
        .btn-reject { background: #ff003c; color: #fff; }
    </style>
</head>
<body>
    <div class="admin-header">
        <h1><i class="fa-solid fa-user-shield"></i> TRANG QUẢN TRỊ ADMIN</h1>
        <button id="btn-admin-logout" class="btn-logout"><i class="fa-solid fa-power-off"></i> ĐĂNG XUẤT</button>
    </div>

    <h2 style="color:white; margin-bottom: 10px; text-align: left; text-transform:none;">Yêu cầu giao dịch (Nạp/Rút) chờ duyệt</h2>
    <table id="transactions-table">
        <thead>
            <tr>
                <th>Thời gian</th>
                <th>Người chơi</th>
                <th>Loại</th>
                <th>Số tiền</th>
                <th>Chi tiết</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="trans-body">
            <!-- Data will be loaded here -->
        </tbody>
    </table>

    <h2 style="color:#00ff41; margin-bottom: 10px; margin-top: 50px; text-align: left; text-transform:none;">Lịch sử giao dịch đã xử lý</h2>
    <table id="history-table">
        <thead>
            <tr>
                <th>Thời gian</th>
                <th>Người chơi</th>
                <th>Loại</th>
                <th>Số tiền</th>
                <th>Trạng thái</th>
                <th>Kết quả / Mã thẻ</th>
            </tr>
        </thead>
        <tbody id="history-body">
            <!-- Processed data will be loaded here -->
        </tbody>
    </table>

    <script src="admin.js"></script>
</body>
</html>
