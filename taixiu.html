<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tài Xỉu Ruby - Sun Club</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="taixiu.css?v=102">
</head>
<body class="ruby-theme">

    <div class="game-container">
        <!-- Nút quay về -->
        <a href="lobby.html" class="back-btn"><i class="fa-solid fa-house"></i></a>

        <!-- BÀN GAME CHÍNH -->
        <div class="ruby-board">
            
            <!-- Header: Thông tin phiên -->
            <div class="ruby-header">
                <div class="header-tools left">
                    <button id="btn-soicau"><i class="fa-solid fa-chart-line"></i></button>
                    <button><i class="fa-solid fa-circle-question"></i></button>
                </div>
                
                <div class="ruby-session">
                    <span class="session-label">PHIÊN</span>
                    <span class="session-number" id="round-id-display">#000000</span>
                </div>

                <div class="header-tools right">
                    <button id="btn-bxh"><i class="fa-solid fa-trophy"></i></button>
                    <button onclick="toggleChat()"><i class="fa-solid fa-comment-dots"></i></button>
                </div>
            </div>

            <!-- Khu vực cược chính -->
            <div class="betting-main">
                
                <!-- Cửa TÀI -->
                <div class="bet-panel tai" id="side-tai">
                    <div class="panel-header">
                        <span class="user-count"><i class="fa-solid fa-user"></i> <span id="users-tai">0</span></span>
                    </div>
                    <div class="side-name">TÀI</div>
                    <div class="pool-amount" id="tai-total-pool">0</div>
                    <div class="my-bet-info">
                        <div class="bet-label">ĐÃ CƯỢC</div>
                        <div class="bet-val" id="my-bet-tai">0</div>
                    </div>
                    <!-- Hiệu ứng thắng -->
                    <div class="win-glow"></div>
                </div>

                <!-- Vòng tròn trung tâm (Xúc xắc/Đồng hồ) -->
                <div class="center-stage" id="center-circle-area">
                    <div id="countdown-timer" class="ruby-timer">--</div>
                    
                    <div class="dice-box hidden" id="dice-scene">
                        <div class="dice-3d" id="dice-1">
                            <div class="face front"><span class="dot-1"></span></div>
                            <div class="face back"><span class="dot-6"></span><span class="dot-6"></span><span class="dot-6"></span><span class="dot-6"></span><span class="dot-6"></span><span class="dot-6"></span></div>
                            <div class="face right"><span class="dot-2"></span><span class="dot-2"></span></div>
                            <div class="face left"><span class="dot-5"></span><span class="dot-5"></span><span class="dot-5"></span><span class="dot-5"></span><span class="dot-5"></span></div>
                            <div class="face top"><span class="dot-3"></span><span class="dot-3"></span><span class="dot-3"></span></div>
                            <div class="face bottom"><span class="dot-4"></span><span class="dot-4"></span><span class="dot-4"></span><span class="dot-4"></span></div>
                        </div>
                        <div class="dice-3d" id="dice-2">
                            <div class="face front"><span class="dot-1"></span></div>
                            <div class="face back"><span class="dot-6"></span><span class="dot-6"></span><span class="dot-6"></span><span class="dot-6"></span><span class="dot-6"></span><span class="dot-6"></span></div>
                            <div class="face right"><span class="dot-2"></span><span class="dot-2"></span></div>
                            <div class="face left"><span class="dot-5"></span><span class="dot-5"></span><span class="dot-5"></span><span class="dot-5"></span><span class="dot-5"></span></div>
                            <div class="face top"><span class="dot-3"></span><span class="dot-3"></span><span class="dot-3"></span></div>
                            <div class="face bottom"><span class="dot-4"></span><span class="dot-4"></span><span class="dot-4"></span><span class="dot-4"></span></div>
                        </div>
                        <div class="dice-3d" id="dice-3">
                            <div class="face front"><span class="dot-1"></span></div>
                            <div class="face back"><span class="dot-6"></span><span class="dot-6"></span><span class="dot-6"></span><span class="dot-6"></span><span class="dot-6"></span><span class="dot-6"></span></div>
                            <div class="face right"><span class="dot-2"></span><span class="dot-2"></span></div>
                            <div class="face left"><span class="dot-5"></span><span class="dot-5"></span><span class="dot-5"></span><span class="dot-5"></span><span class="dot-5"></span></div>
                            <div class="face top"><span class="dot-3"></span><span class="dot-3"></span><span class="dot-3"></span></div>
                            <div class="face bottom"><span class="dot-4"></span><span class="dot-4"></span><span class="dot-4"></span><span class="dot-4"></span></div>
                        </div>
                    </div>

                    <div id="bowl-cover" class="ruby-bowl hidden"></div>
                </div>

                <!-- Cửa XỈU -->
                <div class="bet-panel xiu" id="side-xiu">
                    <div class="panel-header">
                        <span class="user-count"><i class="fa-solid fa-user"></i> <span id="users-xiu">0</span></span>
                    </div>
                    <div class="side-name">XỈU</div>
                    <div class="pool-amount" id="xiu-total-pool">0</div>
                    <div class="my-bet-info">
                        <div class="bet-label">ĐÃ CƯỢC</div>
                        <div class="bet-val" id="my-bet-xiu">0</div>
                    </div>
                    <div class="win-glow"></div>
                </div>

            </div>

            <!-- Soi cầu (Dưới bàn) -->
            <div class="trend-bar" id="history-dots-container">
                <!-- Dots added by JS -->
            </div>

            <!-- Khu vực chọn tiền (Chips) -->
            <div class="chips-row" id="chips-container">
                <button class="ruby-chip" data-val="1000">1K</button>
                <button class="ruby-chip" data-val="10000">10K</button>
                <button class="ruby-chip" data-val="50000">50K</button>
                <button class="ruby-chip" data-val="100000">100K</button>
                <button class="ruby-chip" data-val="500000">500K</button>
                <button class="ruby-chip" data-val="5000000">5M</button>
                <button class="ruby-chip" data-val="10000000">10M</button>
                <button class="ruby-chip" data-val="50000000">50M</button>
            </div>

            <!-- Nút chức năng -->
            <div class="ruby-actions">
                <div class="balance-pill">
                    <i class="fa-solid fa-coins"></i> <span id="current-balance">0</span>
                </div>
                <div class="action-btns">
                    <button id="btn-allin" class="btn-ruby secondary">TẤT TAY</button>
                    <button id="btn-confirm" class="btn-ruby primary">ĐẶT CƯỢC</button>
                    <button id="btn-cancel" class="btn-ruby danger">HỦY</button>
                </div>
            </div>
        </div>
    </div>

    <!-- HỆ THỐNG CHAT (MỚI) -->
    <div class="ruby-chat" id="chat-container">
        <div class="chat-head" onclick="toggleChat()">
            <i class="fa-solid fa-comments"></i> KÊNH CHAT
            <span class="chat-toggle-icon"><i class="fa-solid fa-chevron-up"></i></span>
        </div>
        <div class="chat-body">
            <div class="chat-messages" id="chat-messages">
                <div class="chat-msg system">Hệ thống: Chào mừng sếp đến với kênh chat!</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Nhập tin nhắn..." maxlength="100">
                <button id="btn-send-chat"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="modal-bxh" class="ruby-modal hidden">
        <div class="modal-content">
            <div class="modal-header">BẢNG XẾP HẠNG <i class="fa-solid fa-xmark" id="btn-close-bxh"></i></div>
            <div class="rank-list" id="rank-list-container"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="taixiu.js?v=102"></script>
</body>
</html>
